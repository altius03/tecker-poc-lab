syntax = "proto3";

package edr.telemetry.v1;

service TelemetryIngestService {
  rpc IngestTelemetry(TelemetryBundle) returns (IngestResponse);
  rpc RefreshDeviceToken(DeviceTokenRefreshRequest) returns (DeviceTokenRefreshResponse);
}

message TelemetryBundle {
  TelemetryContext context = 1;
  string generated_at = 2;
  Summary summary = 3;
  repeated Alert alerts = 4;
  repeated Incident incidents = 5;
  repeated EndpointRisk endpoint_risk = 6;
  bytes compressed_payload = 7;
}

message TelemetryContext {
  string customer_id = 1;
  string device_id = 2;
  string agent_version = 3;
  string envelope_version = 4;
  string auth_mode = 5;
}

message Summary {
  int32 valid_event_count = 1;
  int32 alert_count = 2;
  int32 incident_count = 3;
  int32 dlq_event_count = 4;
  int32 highest_risk_score = 5;
}

message Alert {
  string alert_id = 1;
  string rule_id = 2;
  string host_id = 3;
  string severity = 4;
  int32 risk_score = 5;
  string title = 6;
  repeated string evidence = 7;
}

message Incident {
  string incident_id = 1;
  string host_id = 2;
  string severity = 3;
  int32 risk_score = 4;
  string decision = 5;
}

message EndpointRisk {
  string host_id = 1;
  int32 risk_score = 2;
  string severity = 3;
  int32 alert_count = 4;
}

message IngestResponse {
  bool accepted = 1;
  string bundle_id = 2;
  string received_at = 3;
}

message DeviceTokenRefreshRequest {
  string customer_id = 1;
  string device_id = 2;
}

message DeviceTokenRefreshResponse {
  string access_token = 1;
  int32 expires_in = 2;
}
